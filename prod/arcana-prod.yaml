apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arcana-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: arcana-production
    server: https://kubernetes.default.svc
  # Single Helm chart in the Arcana repo at k8s/Chart.yaml. ArgoCD
  # renders it with the base values plus the prod overlay; the CI
  # deploy job rewrites values.production.yaml image tags on each push.
  source:
    repoURL: git@github.com:jojobobby/Arcana.git
    targetRevision: main
    path: k8s
    helm:
      releaseName: arcana
      valueFiles:
        - values.yaml
        - values.production.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      # Client-side apply, not server-side. Server-side apply uses
      # strategic-merge with containerPort as the merge key on the
      # ports list — renaming or renumbering ports leaves phantom
      # entries that fail validation with "Duplicate value: appserver".
      # Client-side `kubectl apply -f` overwrites the spec verbatim.
      - ServerSideApply=false
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 5
