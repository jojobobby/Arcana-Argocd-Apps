apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cosmic-dev
  namespace: argocd
spec:
  project: default
  destination:
    namespace: cosmic-development
    server: https://kubernetes.default.svc
  source:
    repoURL: git@github.com:jojobobby/Cosmic-LTS.git
    targetRevision: development
    path: k8s
    helm:
      releaseName: cosmic
      valueFiles:
        - values.yaml
        - values.development.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
